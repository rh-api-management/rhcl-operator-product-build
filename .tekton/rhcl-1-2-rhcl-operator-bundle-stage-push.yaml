apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/rh-api-management/rhcl-operator-product-build?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "rhcl-1.2" && ( "bundle-hack/*".pathChanged() || "Containerfile.rhcl-operator-bundle-stage".pathChanged() || "downstream-conversion/*".pathChanged() ||  "requirements-build.in".pathChanged() || "requirements-build.txt".pathChanged() || "rpms.lock.yaml".pathChanged() || "config/*".pathChanged() || ".tekton/rhcl-1-2-rhcl-operator-bundle-stage-push.yaml".pathChanged() || ".tekton/bundle-build-pipeline.yaml".pathChanged() )
  creationTimestamp: null
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: rhcl-1-2-rhcl-operator
    appstudio.openshift.io/component: rhcl-1-2-rhcl-operator-bundle-stage
    pipelines.appstudio.openshift.io/type: build
  name: rhcl-1-2-rhcl-operator-bundle-stage-on-push
  namespace: api-management-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/api-management-tenant/rhcl-1-2-rhcl-operator-bundle-stage:{{revision}}
  - name: dockerfile
    value: Containerfile.rhcl-operator-bundle-stage
  - name: prefetch-input
    value: '[{"type": "rpm", "path": "."}, {"type": "pip", "path": "."}, {"type": "gomod", "path": "kuadrant-operator/"}]'
  pipelineRef:
    name: bundle-build-pipeline
  taskRunTemplate:
    serviceAccountName: build-pipeline-rhcl-1-2-rhcl-operator-bundle-stage
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}