name: Generate Bundle

on:
  push:
    paths:
      - 'image-pullspecs.yaml'
      - 'kustomize/**'
      - 'kuadrant-operator'
    branches:
      - 'rhcl-*'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  generate-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Generate bundles
        run: |
          make bundle

      - name: Check for changes
        id: git-check
        run: |
          git add -N bundle-dev/ bundle-stage/ bundle/ 2>/dev/null || true
          if git diff --exit-code --quiet; then
            echo "No changes detected"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add bundle-dev/ bundle-stage/ bundle/
          git commit -m "Update bundle manifests

          Auto-generated by bundle generation workflow using kustomize.

          Generated bundles:
          - bundle/ (production, registry.redhat.io pullspecs)
          - bundle-dev/ (development, quay.io pullspecs)
          - bundle-stage/ (staging, registry.stage.redhat.io pullspecs)"
          git push
